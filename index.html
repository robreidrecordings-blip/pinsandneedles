<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>PINS & NEEDLES · RADIO</title>
  <script src="https://unpkg.com/livekit-client@2/dist/livekit-client.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono&family=Audiowide&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c0f;
      --accent: #ff4d6d;
      --live: #ff3b5c;
      --gold: #ffcd4d;
      --premium: #c28aff;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: #f0f2f5;
      min-height: 100vh;
      touch-action: manipulation;
    }
    header {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      padding: 1rem;
      z-index: 100;
    }
    .logo {
      font-family: 'Audiowide', cursive;
      font-size: 1.8rem;
      color: var(--accent);
    }
    button {
      min-height: 56px;
      font-size: 1.1rem;
      padding: 0 1.5rem;
      border-radius: 999px;
      transition: all 0.2s;
    }
    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stage {
      aspect-ratio: 16/9;
      background: black;
      position: relative;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #waveform {
      height: 60px;
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 1rem;
      background: #111;
    }
    .bar {
      flex: 1;
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
      transition: height 0.1s;
    }
    .panel { display: none; padding: 1rem; }
    .panel.active { display: block; }
    .tab.active {
      background: white !important;
      color: black !important;
    }
  </style>
</head>
<body>

<header class="flex justify-between items-center">
  <div class="logo">PINS & NEEDLES</div>
  <button onclick="openModal('djModal')" class="bg-white/20 hover:bg-white/30">DJ LOGIN</button>
</header>

<div class="stage">
  <div id="stageIdle" class="absolute inset-0 flex flex-col items-center justify-center gap-6 bg-gradient-to-br from-black to-[#0b0c0f]">
    <div id="mainVinyl" class="w-32 h-32 rounded-full bg-gradient-to-br from-zinc-800 to-black flex items-center justify-center animate-spin-slow">
      <div class="w-10 h-10 bg-black rounded-full border-4 border-zinc-700"></div>
    </div>
    <div class="text-center">
      <div class="text-3xl font-bold">No DJ Active</div>
      <div class="text-zinc-400 mt-2">Be the first to join!</div>
    </div>
  </div>
  <video id="liveVid" autoplay playsinline class="hidden"></video>
</div>

<div id="waveform"></div>

<div class="p-4">
  <div class="flex gap-4 mb-6">
    <button onclick="goTab('listen')" class="tab active flex-1 glass">Listen</button>
    <button onclick="goTab('booth')" class="tab flex-1 glass">Booth</button>
  </div>

  <div id="listen" class="panel active">
    <div id="rqList" class="text-center py-12 text-zinc-400">
      No DJs yet — be the first to join!
    </div>
  </div>

  <div id="booth" class="panel hidden space-y-6">
    <button onclick="document.getElementById('fileInput').click()" class="w-full py-6 bg-white/10 hover:bg-white/20 rounded-2xl text-lg">
      + Add Music from Phone
    </button>
    <input type="file" id="fileInput" accept="audio/*" multiple hidden onchange="addFiles(this.files)">

    <div class="grid grid-cols-2 gap-4">
      <button onclick="togMic()" class="py-8 glass rounded-2xl text-xl flex flex-col items-center gap-2">
        <span class="text-4xl">🎤</span>MIC
      </button>
      <button onclick="togCam()" class="py-8 glass rounded-2xl text-xl flex flex-col items-center gap-2">
        <span class="text-4xl">📸</span>CAM
      </button>
    </div>

    <button id="liveBtn" onclick="togLive()" class="w-full py-6 text-xl font-bold rounded-2xl bg-gradient-to-r from-[var(--accent)] to-[var(--live)]">
      GO LIVE
    </button>
  </div>
</div>

<!-- DJ Modal -->
<div id="djModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50">
  <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm mx-4">
    <h2 class="text-2xl font-bold mb-6">DJ Login</h2>
    <input id="djCodeIn" placeholder="PNR-XXXX" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-5 mb-6 text-lg">
    <button onclick="doLogin()" class="w-full py-5 bg-[var(--accent)] text-black font-bold rounded-2xl text-lg">ENTER</button>
    <button onclick="document.getElementById('djModal').classList.add('hidden')" class="w-full mt-4 text-zinc-400">Cancel</button>
  </div>
</div>

<script>
  const TOKEN_ENDPOINT = 'http://159.223.192.8:3001/token';
  const WS_URL = 'wss://YOUR_PROJECT_NAME.livekit.cloud'; // CHANGE THIS!!!

  let liveKitRoom = null;
  let audioCtx = null;
  let destNode = null;
  let micStream = null;
  let camStream = null;
  let audioEl = null;
  let songs = [];

  // Resume AudioContext on any interaction (mobile fix)
  document.addEventListener('touchstart', () => {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }, { once: true });

  function openModal(id) {
    document.getElementById(id).classList.remove('hidden');
  }

  function doLogin() {
    const code = document.getElementById('djCodeIn').value.trim().toUpperCase();
    if (code.startsWith('PNR-')) {
      document.getElementById('djModal').classList.add('hidden');
      document.getElementById('rqList').innerHTML = '<div class="text-green-400 text-center py-8">You are in the queue! Go to Booth to go live.</div>';
    } else {
      alert('Code must start with PNR-');
    }
  }

  async function togLive() {
    const btn = document.getElementById('liveBtn');
    const isGoingLive = btn.textContent.includes('GO LIVE');

    if (isGoingLive) {
      if (!micStream && !audioEl) {
        alert('Enable mic or add music first');
        return;
      }

      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          await audioCtx.resume();
        }

        destNode = audioCtx.createMediaStreamDestination();

        if (audioEl) {
          const src = audioCtx.createMediaElementSource(audioEl);
          src.connect(destNode);
        }

        if (micStream) {
          const src = audioCtx.createMediaStreamSource(micStream);
          src.connect(destNode);
        }

        const mixedTrack = destNode.stream.getAudioTracks()[0];
        if (!mixedTrack) throw new Error('No audio track');

        const identity = 'DJ_Test'; // or from login
        const res = await fetch(`${TOKEN_ENDPOINT}?room=pinsradio&identity=${encodeURIComponent(identity)}`);
        if (!res.ok) throw new Error('Token fetch failed');
        const { token } = await res.json();

        const room = new LiveKit.Room();
        await room.connect(WS_URL, token);

        await room.localParticipant.publishTrack(mixedTrack, { name: 'DJ-Mixed-Audio' });

        if (camStream) {
          await room.localParticipant.publishTrack(camStream.getVideoTracks()[0]);
          document.getElementById('liveVid').srcObject = camStream;
          document.getElementById('liveVid').classList.remove('hidden');
          document.getElementById('stageIdle').classList.add('hidden');
        }

        liveKitRoom = room;
        btn.textContent = '■ END LIVE';
        btn.classList.add('bg-red-600');
        alert('LIVE! Your mix is broadcasting.');
      } catch (e) {
        alert('Live failed: ' + e.message + '\nCheck console or token server');
        console.error(e);
      }
    } else {
      liveKitRoom?.disconnect();
      liveKitRoom = null;
      btn.textContent = 'GO LIVE';
      btn.classList.remove('bg-red-600');
    }
  }

  async function togMic() {
    if (!micStream) {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        alert('Mic on');
      } catch (e) {
        alert('Mic permission denied');
      }
    } else {
      micStream.getTracks().forEach(t => t.stop());
      micStream = null;
      alert('Mic off');
    }
  }

  async function togCam() {
    if (!camStream) {
      try {
        camStream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('liveVid').srcObject = camStream;
        document.getElementById('liveVid').classList.remove('hidden');
        document.getElementById('stageIdle').classList.add('hidden');
        alert('Camera on');
      } catch (e) {
        alert('Camera permission denied');
      }
    } else {
      camStream.getTracks().forEach(t => t.stop());
      camStream = null;
      document.getElementById('liveVid').classList.add('hidden');
      document.getElementById('stageIdle').classList.remove('hidden');
      alert('Camera off');
    }
  }

  function addFiles(files) {
    Array.from(files).forEach(file => {
      if (file.type.startsWith('audio/')) {
        const url = URL.createObjectURL(file);
        songs.push({ name: file.name, url });
      }
    });
    if (songs.length && !audioEl) {
      audioEl = new Audio(songs[0].url);
      audioEl.play().catch(() => alert('Tap screen to allow audio'));
    }
    alert(`${songs.length} track(s) added`);
  }

  function goTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
    document.getElementById(tab).classList.remove('hidden');
  }

  // Waveform animation (visual only)
  function animateWave() {
    const bars = document.querySelectorAll('.bar');
    bars.forEach(bar => {
      bar.style.height = Math.random() * 100 + '%';
    });
    requestAnimationFrame(animateWave);
  }

  window.onload = () => {
    // Create waveform bars
    const wf = document.getElementById('waveform');
    for (let i = 0; i < 40; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      wf.appendChild(bar);
    }
    animateWave();

    // Auto-resume context on interaction
    document.addEventListener('click', () => {
      if (audioCtx?.state === 'suspended') audioCtx.resume();
    }, { once: true });
  };
</script>
</body>
</html>
